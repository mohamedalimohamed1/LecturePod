name: Deploy LecturePod to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: lecturepod/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lecturepod

      - name: Build
        run: npm run build
        working-directory: lecturepod
        env:
          VITE_APP_USERNAME: ${{ secrets.VITE_APP_USERNAME }}
          VITE_APP_PASSWORD: ${{ secrets.VITE_APP_PASSWORD }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./lecturepod/dist
